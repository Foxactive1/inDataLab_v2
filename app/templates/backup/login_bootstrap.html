<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InDataLab - Login</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary: #0f63d8;
            --primary-dark: #0a47a0;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a2a4a 50%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .auth-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(15, 99, 216, 0.2);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .auth-header h1 {
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: #94a3b8;
            font-size: 14px;
        }
        
        .nav-tabs {
            border-bottom: 2px solid rgba(15, 99, 216, 0.1) !important;
            margin-bottom: 30px;
        }
        
        .nav-tabs .nav-link {
            color: #94a3b8;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 12px 0;
            margin-right: 30px;
            transition: all 0.3s;
        }
        
        .nav-tabs .nav-link:hover {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        
        .nav-tabs .nav-link.active {
            color: white;
            border-bottom-color: var(--primary);
            background: transparent;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .form-control, .form-select {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(15, 99, 216, 0.2);
            border-radius: 8px;
            color: white;
            padding: 12px 16px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-control:focus, .form-select:focus {
            background: rgba(30, 41, 59, 1);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 0 3px rgba(15, 99, 216, 0.1);
        }
        
        .form-control::placeholder {
            color: #64748b;
        }
        
        .form-select option {
            background: #1e293b;
            color: white;
        }
        
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(15, 99, 216, 0.4);
        }
        
        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
            padding: 12px 16px;
        }
        
        .alert-success {
            background: rgba(16, 169, 129, 0.1);
            color: #a7f3d0;
            border-left: 3px solid #10a981;
        }
        
        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border-left: 3px solid #ef4444;
        }
        
        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            color: #93c5fd;
            border-left: 3px solid #3b82f6;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .form-text {
            color: #94a3b8;
            font-size: 12px;
        }
        
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
            }
            
            .auth-header h1 {
                font-size: 24px;
            }
            
            .nav-tabs .nav-link {
                margin-right: 15px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="bi bi-lightning-fill"></i> InDataLab</h1>
                <p>Plataforma de Notebooks para Análise de Dados</p>
            </div>

            <!-- Alertas -->
            <div id="alertContainer"></div>

            <!-- Abas -->
            <ul class="nav nav-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">
                        <i class="bi bi-person-plus"></i> Registrar
                    </button>
                </li>
            </ul>

            <!-- Conteúdo das Abas -->
            <div class="tab-content">
                <!-- LOGIN -->
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="loginEmail" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="seu@email.com" required>
                        </div>

                        <div class="form-group">
                            <label for="loginPassword" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn-auth" id="loginBtn">
                            <span id="loginBtnText">✓ Fazer Login</span>
                        </button>

                        <div class="form-text mt-3 text-center">
                            <small>Não tem conta? <a href="#" onclick="switchTab('register')" class="text-primary">Registre-se aqui</a></small>
                        </div>
                    </form>
                </div>

                <!-- REGISTRO -->
                <div class="tab-pane fade" id="register" role="tabpanel">
                    <form id="registerForm">
                        <div class="form-group">
                            <label for="registerName" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="registerName" placeholder="Seu nome" required>
                        </div>

                        <div class="form-group">
                            <label for="registerEmail" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="registerEmail" placeholder="seu@email.com" required>
                        </div>

                        <div class="form-group">
                            <label for="registerPassword" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="registerPassword" placeholder="••••••••" required>
                            <small class="form-text">Mínimo 6 caracteres</small>
                        </div>

                        <div class="form-group">
                            <label for="registerConfirmPassword" class="form-label">Confirmar Senha</label>
                            <input type="password" class="form-control" id="registerConfirmPassword" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn-auth" id="registerBtn">
                            <span id="registerBtnText">✓ Criar Conta</span>
                        </button>

                        <div class="form-text mt-3 text-center">
                            <small>Já tem conta? <a href="#" onclick="switchTab('login')" class="text-primary">Faça login aqui</a></small>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const API_BASE = 'http://localhost:5000';

        // Verificar se já está autenticado
        if (localStorage.getItem('access_token')) {
            window.location.href = 'dashboard.html';
        }

        // Alternar entre abas
        function switchTab(tabName) {
            const tab = document.querySelector(`[data-bs-target="#${tabName}"]`);
            if (tab) tab.click();
        }

        // Mostrar alerta
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertId = 'alert-' + Date.now();
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" id="${alertId}" role="alert">
                    <i class="bi bi-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'}"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            
            // Auto remover após 5 segundos
            setTimeout(() => {
                const alert = document.getElementById(alertId);
                if (alert) alert.remove();
            }, 5000);
        }

        // LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.toLowerCase();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginBtnText');
            const originalText = btnText.textContent;
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span>Autenticando...';
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    showAlert('✓ Login realizado com sucesso!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    showAlert(data.error || 'Erro ao fazer login', 'danger');
                }
            } catch (error) {
                console.error('Erro:', error);
                showAlert('Erro de conexão. Verifique a URL da API.', 'danger');
            } finally {
                btn.disabled = false;
                btnText.textContent = originalText;
            }
        });

        // REGISTRO
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value.toLowerCase();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            
            // Validações
            if (password.length < 6) {
                showAlert('Senha deve ter pelo menos 6 caracteres', 'danger');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('As senhas não coincidem', 'danger');
                return;
            }
            
            const btn = document.getElementById('registerBtn');
            const btnText = document.getElementById('registerBtnText');
            const originalText = btnText.textContent;
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span>Criando conta...';
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('✓ Conta criada com sucesso! Fazendo login...', 'success');
                    
                    // Auto-login
                    const loginResponse = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    
                    const loginData = await loginResponse.json();
                    if (loginData.access_token) {
                        localStorage.setItem('access_token', loginData.access_token);
                        localStorage.setItem('currentUser', JSON.stringify(loginData.user));
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    }
                } else {
                    showAlert(data.error || 'Erro ao registrar', 'danger');
                }
            } catch (error) {
                console.error('Erro:', error);
                showAlert('Erro de conexão. Verifique a URL da API.', 'danger');
            } finally {
                btn.disabled = false;
                btnText.textContent = originalText;
            }
        });
    </script>
</body>
</html>
